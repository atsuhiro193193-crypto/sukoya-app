<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>健屋花那 推しアプリ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: sans-serif;
      background: #e8f3ff;
      margin: 0;
      padding: 10px;
    }
    h1 {
      text-align: center;
      color: #2b6cb0;
    }
    section {
      background: white;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>💙 健屋花那 推しアプリ</h1>

<section>
  <h2>🐦 最新ツイート</h2>
  <a class="twitter-timeline" href="https://twitter.com/sukosuko_sukoya">
    Tweets by 健屋花那
  </a>
  <script async src="https://platform.twitter.com/widgets.js"></script>
</section>

<section>
  <h2>▶️ 配信予定</h2>
  <div id="youtube">読み込み中...</div>
</section>

<script>
const API_KEY = "ここにあなたのAPIキー";
const CHANNEL_ID = "UC8C1LLhBhf_E2IBPLSDJXlQ";

fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=upcoming&type=video&key=${API_KEY}`)
  .then(res => res.json())
  .then(data => {
    const div = document.getElementById("youtube");
    div.innerHTML = "";
    data.items.forEach(item => {
      const videoId = item.id.videoId;
      const title = item.snippet.title;
      div.innerHTML += `
        <p>${title}</p>
        <iframe width="100%" height="200" src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
      `;
    });
  });
</script>

</body>
</html>
